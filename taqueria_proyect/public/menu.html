<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Menú - Taquería Miraflores</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Barra de navegación -->
  <nav class="navbar">
    <div class="logo">
      <img src="logo_taqueria.png" alt="Logo Taquería" />
    </div>
    <ul class="nav-links">
      <li><a href="menu.html">Menú</a></li>
      <li><a href="domicilio.html">Domicilio</a></li>
      <li><a href="contacto.html">Contacto</a></li>
    </ul>
  </nav>

  <!-- Contenedor principal -->
  <div class="main-container">
    <h1 class="title">Taquería Miraflores</h1>

    <div class="menu-layout">
      <!-- Índice lateral con categorías -->
      <div class="menu-sidebar">
        <h2 class="sidebar-title">Categorías</h2>
        <button onclick="mostrarCategoria('tacos')">Tacos</button>
        <button onclick="mostrarCategoria('quesadillas')">Quesadillas</button>
        <button onclick="mostrarCategoria('gringas')">Gringas</button>
        <button onclick="mostrarCategoria('tortas')">Tortas</button>
        <button onclick="mostrarCategoria('extras')">Extras</button>
        <button onclick="mostrarCategoria('bebidas')">Bebidas</button>
      </div>

      <!-- Centro: menú dinámico -->
      <div class="menu-content" id="menu-content">
        <p>Selecciona una categoría para ver los productos</p>
      </div>

      <!-- Carrito -->
      <div class="menu-extra">
        <h3>Carrito</h3>
        <ul id="carrito"></ul>
        <button id="comprar-btn">Comprar/Pedir</button>
      </div>
    </div>
  </div>

  <script>
    // 🔧 Datos del menú (modifica aquí los productos)
    const menuData = {
      tacos: [
        { nombre: "Al Pastor", precio: 50 },
        { nombre: "Suadero", precio: 50 },
        { nombre: "Carnitas", precio: 50 },
        { nombre: "De Canasta", precio: 50 },
        { nombre: "Chorizo", precio: 50 }
      ],
      quesadillas: [
        { nombre: "Pastor", precio: 50 },
        { nombre: "Queso", precio: 50 },
        { nombre: "Huitlacoche", precio: 50 },
        { nombre: "Chicharrón", precio: 50 },
        { nombre: "Pescado", precio: 50 }
      ],
      gringas: [
        { nombre: "Clásica", precio: 50 },
        { nombre: "Especial", precio: 50 },
        { nombre: "Norteña", precio: 50 }
      ],
      tortas: [
        { nombre: "Cubana", precio: 50 },
        { nombre: "Pastor", precio: 50 },
        { nombre: "Milanesa", precio: 50 },
        { nombre: "Mixta", precio: 50 }
      ],
      extras: [
        { nombre: "Orden de Cebollitas", precio: 50 },
        { nombre: "Guacamole", precio: 50 },
        { nombre: "Salsa Especial", precio: 50 }
      ],
      bebidas: [
        // Aquí luego agregas las bebidas
      ]
    };

    const carrito = [];

    // Mostrar productos de una categoría
    function mostrarCategoria(categoria) {
      const contenedor = document.getElementById("menu-content");
      contenedor.innerHTML = `<h2>${categoria.toUpperCase()}</h2>`;

      menuData[categoria].forEach((item, index) => {
        const div = document.createElement("div");
        div.classList.add("menu-item");
        div.innerHTML = `
          <p><strong>${item.nombre}</strong> - $${item.precio}</p>
          <button onclick="agregarAlCarrito('${categoria}', ${index})">Agregar</button>
        `;
        contenedor.appendChild(div);
      });
    }

    // Agregar al carrito
    function agregarAlCarrito(categoria, index) {
      const producto = menuData[categoria][index];
      carrito.push(producto);
      actualizarCarrito();
    }

    // Actualizar carrito
    function actualizarCarrito() {
      const carritoLista = document.getElementById("carrito");
      carritoLista.innerHTML = "";

      carrito.forEach((producto, i) => {
        const li = document.createElement("li");
        li.innerHTML = `
          <span>${producto.nombre} - $${producto.precio}</span>
          <button class="eliminar-btn" onclick="eliminarDelCarrito(${i})">X</button>
        `;
        carritoLista.appendChild(li);
      });
    }

    // Eliminar producto del carrito
    function eliminarDelCarrito(index) {
      carrito.splice(index, 1);
      actualizarCarrito();
    }

    // Botón comprar (todavía no guarda en DB)
    document.getElementById("comprar-btn").addEventListener("click", () => {
      alert("🛒 Pedido listo para procesar (aún no se guarda en DB).");
    });
  </script>
</body>
</html>
