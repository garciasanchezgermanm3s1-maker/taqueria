<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Menú - Taquería Miraflores</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Barra de navegación -->
  <nav class="navbar">
    <div class="logo">
      <img src="logo_taqueria.png" alt="Logo Taquería" />
    </div>
    <ul class="nav-links">
      <li><a href="menu.html">Menú</a></li>
      <li><a href="domicilio.html">Domicilio</a></li>
      <li><a href="contacto.html">Contacto</a></li>
    </ul>
  </nav>

  <!-- Contenedor principal -->
  <div class="main-container">
    <h1 class="title">Taquería Miraflores</h1>
    <p class="subtitle">Descripción</p>

    <div class="menu-layout">
      <!-- Lado izquierdo -->
      <div class="menu-sidebar">
        <div class="menu-section">Comida</div>
        <details>
          <summary>Comida</summary>
          <div class="categoria" onclick="cambiarImagen('tacos.jpg')">Tacos</div>
          <div class="categoria" onclick="cambiarImagen('quesadillas.jpg')">Quesadillas</div>
          <div class="categoria" onclick="cambiarImagen('gringas.jpg')">Gringas</div>
        </details>
        <div class="menu-section">Bebida</div>
        <details>
          <summary>Bebidas</summary>
          <div class="categoria" onclick="cambiarImagen('horchata.jpg')">Aguas</div>
          <div class="categoria" onclick="cambiarImagen('jugo.jpg')">Jugos</div>
          <div class="categoria" onclick="cambiarImagen('refresco.jpg')">Refrescos</div>
        </details>
      </div>

      <!-- Centro: espacio para menú -->
      <div class="menu-content">
        <p>Espacio para menú</p>
        <img id="imagenMenu" src="tacos.jpg" alt="Menú Taquería" style="max-width: 100%; border-radius: 8px; margin-top: 20px;" />
      </div>

      <!-- Lado derecho -->
      <div class="menu-extra">
        <div class="menu-box">Imágenes representativas</div>
        <div class="menu-info">
          <span class="icon">⭐</span> Rating
        </div>
        <div class="menu-info">
          <span class="icon">📍</span> Dirección
        </div>
      </div>
    </div>
  </div>

  <script>
    function cambiarImagen(imagen) {
      document.getElementById("imagenMenu").src = imagen;
    }
  </script>
</body>
</html>
