<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taquería</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
    display:flex;
    height:100vh;
}

/* MENÚ */

.menu{
    width:300px;
    background:#8B0000;
    color:white;
    padding:20px;
    box-sizing:border-box;
}

.menu h1{
    text-align:center;
}

details{
    margin-bottom:15px;
    background:#a30000;
    border-radius:10px;
    overflow:hidden;
}

summary{
    padding:15px;
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
}

.categoria{
    padding:12px 20px;
    cursor:pointer;
    transition:0.3s;
}

.categoria:hover{
    background:#d94c4c;
}

/* IMAGEN */

.contenido{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
}

.contenido img{
    width:500px;
    height:350px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

</style>
</head>
<body>

<!-- MENÚ -->
<div class="menu">

    <h1>Taquería</h1>

    <!-- COMIDA -->
    <details>
        <summary>Comida</summary>

        <div class="categoria" onclick="cambiarImagen('tacos.jpg')">
            Tacos
        </div>

        <div class="categoria" onclick="cambiarImagen('quesadillas.jpg')">
            Quesadillas
        </div>

        <div class="categoria" onclick="cambiarImagen('gringas.jpg')">
            Gringas
        </div>
    </details>

    <!-- BEBIDAS -->
    <details>
        <summary>Bebidas</summary>

        <div class="categoria" onclick="cambiarImagen('horchata.jpg')">
            Aguas
        </div>

        <div class="categoria" onclick="cambiarImagen('jugo.jpg')">
            Jugos
        </div>

        <div class="categoria" onclick="cambiarImagen('refresco.jpg')">
            Refrescos
        </div>
    </details>

</div>

<!-- IMAGEN -->
<div class="contenido">
    <img id="imagenMenu" src="tacos.jpg">
</div>

<script>

function cambiarImagen(imagen){
    document.getElementById("imagenMenu").src = imagen;
}

</script>

</body>
</html>
